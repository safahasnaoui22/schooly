<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>






<section class="school-stats">

<div class="container">

<h2 class="stats-title">Notre École en Chiffres</h2>
<p class="stats-subtitle">
Une école engagée dans la réussite et l’épanouissement de chaque élève
</p>

<div class="stats-grid">

<div class="stat-card">
<h3 class="counter" data-target="500">0</h3>
<span>Élèves accompagnés</span>
</div>

<div class="stat-card">
<h3 class="counter" data-target="20">0</h3>
<span>Enseignants qualifiés</span>
</div>

<div class="stat-card">
<h3 class="counter" data-target="15">0</h3>
<span>Classes modernes</span>
</div>

<div class="stat-card">
<h3 class="counter" data-target="95">0</h3>
<span>Réussite scolaire</span>
</div>

</div>

</div>
</section>
<style>
    .school-stats{
padding:100px 0;
text-align:center;
background:linear-gradient(180deg,#f8fbff,#ffffff);
}

.stats-title{
font-size:38px;
color:#0e4a67;
margin-bottom:10px;
}

.stats-subtitle{
color:#6c7a86;
margin-bottom:60px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:40px;
}

.stat-card{
padding:30px;
border-radius:18px;
background:white;
transition:all .4s ease;
}

.stat-card:hover{
transform:translateY(-8px);
}

/* 3D numbers */

.stat-card h3{
font-size:60px;
font-weight:800;

background:linear-gradient(135deg,#1c7fa6,#4fb3d8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 3px 0 rgba(0,0,0,0.05),
0 6px 15px rgba(0,0,0,0.1);

margin-bottom:10px;
}

.stat-card span{
color:#6c7a86;
font-size:16px;
}

</style>


<script>
    const counters = document.querySelectorAll(".counter");

function animateCounters(){

counters.forEach(counter => {

const target = +counter.getAttribute("data-target");
let count = 0;

const step = target / 120;

function update(){

count += step;

if(count < target){

counter.innerText = Math.ceil(count);

requestAnimationFrame(update);

}else{

counter.innerText = target + "+";

}

}

update();

});

}

const observer = new IntersectionObserver(entries => {

entries.forEach(entry => {

if(entry.isIntersecting){

animateCounters();
observer.disconnect();

}

});

});

observer.observe(document.querySelector(".school-stats"));

</script>





</body>
</html>
