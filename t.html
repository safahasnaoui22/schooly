<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Pen Cursor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

body{
margin:0;
height:200vh;
cursor:none;
background:#f8fafc;
font-family:sans-serif;
}

/* demo button */

.demo{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
padding:16px 32px;
background:#2563EB;
color:white;
border-radius:8px;
font-weight:bold;
}

#penCanvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:9999;
}

#trail{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:9998;
}

@media (pointer:coarse){
body{cursor:auto;}
#penCanvas{display:none;}
#trail{display:none;}
}

</style>
</head>

<body>

<div class="demo">Hover me</div>

<canvas id="penCanvas"></canvas>
<canvas id="trail"></canvas>

<script>

/* ---------- THREE JS PEN ---------- */

const canvas=document.getElementById("penCanvas");

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({
canvas:canvas,
alpha:true,
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

camera.position.z=5;

/* PEN BODY */

const bodyGeo=new THREE.CylinderGeometry(0.05,0.05,1.5,12);
const bodyMat=new THREE.MeshStandardMaterial({color:0x2563EB});

const body=new THREE.Mesh(bodyGeo,bodyMat);
body.rotation.z=Math.PI/2;

scene.add(body);

/* PEN TIP */

const tipGeo=new THREE.ConeGeometry(0.06,0.2,12);
const tipMat=new THREE.MeshStandardMaterial({color:0x111827});

const tip=new THREE.Mesh(tipGeo,tipMat);

tip.position.x=0.85;
tip.rotation.z=Math.PI/2;

scene.add(tip);

/* LIGHT */

const light=new THREE.PointLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));


/* ---------- CURSOR FOLLOW ---------- */

let mouse={x:0,y:0};
let pos={x:0,y:0};

document.addEventListener("mousemove",(e)=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

/* SMOOTH LAG */

function update(){

pos.x += (mouse.x-pos.x)*0.15;
pos.y += (mouse.y-pos.y)*0.15;

body.position.x = (pos.x/window.innerWidth)*10-5;
body.position.y = -(pos.y/window.innerHeight)*6+3;

tip.position.x = body.position.x +0.85;
tip.position.y = body.position.y;

renderer.render(scene,camera);

requestAnimationFrame(update);
}

update();


/* ---------- HOVER EFFECT ---------- */

document.querySelectorAll("button,.demo,a").forEach(el=>{

el.addEventListener("mouseenter",()=>{

gsap.to(body.rotation,{
z:Math.PI/2 + 0.4,
duration:0.3
});

});

el.addEventListener("mouseleave",()=>{

gsap.to(body.rotation,{
z:Math.PI/2,
duration:0.3
});

});

});


/* ---------- INK TRAIL ---------- */

const trailCanvas=document.getElementById("trail");
const ctx=trailCanvas.getContext("2d");

trailCanvas.width=window.innerWidth;
trailCanvas.height=window.innerHeight;

let trail=[];

document.addEventListener("mousemove",(e)=>{

trail.push({
x:e.clientX,
y:e.clientY,
life:30
});

});

function drawTrail(){

ctx.clearRect(0,0,trailCanvas.width,trailCanvas.height);

trail.forEach((p,i)=>{

p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="rgba(37,99,235,0.6)";
ctx.fill();

if(p.life<=0) trail.splice(i,1);

});

requestAnimationFrame(drawTrail);
}

drawTrail();


/* ---------- RESIZE ---------- */

window.addEventListener("resize",()=>{

renderer.setSize(window.innerWidth,window.innerHeight);
trailCanvas.width=window.innerWidth;
trailCanvas.height=window.innerHeight;

});

</script>

</body>
</html>
